<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的四象限清单</title>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --yellow: #ffdb4d; --gray: #999; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; text-align: center; background: white; font-weight: bold; border-bottom: 1px solid #ddd; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 8px; flex: 1; overflow: hidden; }
        .quadrant { background: white; border-radius: 10px; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; position: relative; border-top: 4px solid #ddd; }
        .q1 { border-color: var(--red); } .q2 { border-color: var(--blue); }
        .q3 { border-color: var(--yellow); } .q4 { border-color: var(--gray); }
        h3 { font-size: 13px; margin: 0 0 8px 0; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: #007aff; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 16px; line-height: 22px; }
        
        /* 任务样式 */
        .task-item { background: #f8f9fa; border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 13px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: relative; }
        .task-item strong { display: block; margin-bottom: 3px; color: #222; }
        .task-time { font-size: 11px; color: #888; }
        .del-btn { position: absolute; right: 5px; top: 5px; color: #ccc; border: none; background: none; font-size: 16px; }

        /* 弹窗 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; }
        input { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .save-btn { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">艾森豪威尔矩阵 - 个人看板</div>

<div class="grid-container">
    <div class="quadrant q1" onclick="openModal(1)">
        <h3>重要且紧急 <button class="add-btn">+</button></h3>
        <div id="list1"></div>
    </div>
    <div class="quadrant q2" onclick="openModal(2)">
        <h3>重要不紧急 <button class="add-btn">+</button></h3>
        <div id="list2"></div>
    </div>
    <div class="quadrant q3" onclick="openModal(3)">
        <h3>紧急不重要 <button class="add-btn">+</button></h3>
        <div id="list3"></div>
    </div>
    <div class="quadrant q4" onclick="openModal(4)">
        <h3>不重要不紧急 <button class="add-btn">+</button></h3>
        <div id="list4"></div>
    </div>
</div>

<div id="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle" style="font-size: 16px; margin-top:0;">添加任务</h2>
        <input type="date" id="taskDate">
        <input type="text" id="taskContent" placeholder="要做什么？">
        <input type="time" id="taskTime">
        <button class="save-btn" onclick="saveTask()">保存到清单</button>
    </div>
</div>

<script>
    let currentQuadrant = 1;
    let allTasks = JSON.parse(localStorage.getItem('myQuadTasks')) || [];

    // 初始化：页面加载时渲染已有任务
    window.onload = () => {
        document.getElementById('taskDate').value = new Date().toISOString().split('T')[0];
        renderTasks();
    };

    function openModal(q) {
        currentQuadrant = q;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('taskContent').focus();
    }

    // 点击背景关闭弹窗
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) closeModal(); };

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('taskContent').value = '';
    }

    function saveTask() {
        const content = document.getElementById('taskContent').value;
        const date = document.getElementById('taskDate').value;
        const time = document.getElementById('taskTime').value;

        if (!content) return;

        const newTask = {
            id: Date.now(),
            quadrant: currentQuadrant,
            content: content,
            date: date,
            time: time
        };

        allTasks.push(newTask);
        localStorage.setItem('myQuadTasks', JSON.stringify(allTasks)); // 永久保存
        
        renderTasks();
        closeModal();
    }

    function deleteTask(id, event) {
        event.stopPropagation(); // 防止触发象限的点击事件
        allTasks = allTasks.filter(t => t.id !== id);
        localStorage.setItem('myQuadTasks', JSON.stringify(allTasks));
        renderTasks();
    }

    function renderTasks() {
        // 清空四个列表
        for (let i = 1; i <= 4; i++) document.getElementById('list' + i).innerHTML = '';

        // 分类渲染
        allTasks.forEach(t => {
            const html = `
                <div class="task-item">
                    <button class="del-btn" onclick="deleteTask(${t.id}, event)">×</button>
                    <strong>${t.content}</strong>
                    <span class="task-time">📅 ${t.date} ${t.time ? '⏰ ' + t.time : ''}</span>
                </div>
            `;
            document.getElementById('list' + t.quadrant).innerHTML += html;
        });
    }
</script>
</body>
</html>
